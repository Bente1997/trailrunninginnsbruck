<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div id="whatsappSecurityModal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="absolute inset-0 bg-black bg-opacity-60 backdrop-blur-sm" data-whatsapp-overlay-backdrop></div>
    <div class="relative w-full max-w-sm p-8 border border-gray-200 rounded-2xl shadow-2xl bg-white dark:bg-gray-800" role="dialog">
        <div class="flex justify-between items-center mb-4">
            <p class="text-lg font-bold text-gray-900 dark:text-white leading-tight">Bot Check 🏃‍♂️</p>
            <button id="closeWhatsappModal" class="text-gray-400 hover:text-gray-600 text-2xl font-bold">&times;</button>
        </div>
        <p class="mb-5 text-gray-600 dark:text-gray-400 text-sm">How much is 25 minus 15? Enter numbers only.</p>
        <div class="flex gap-2">
            <input type="text" id="whatsappAnswerInput" placeholder="?" class="w-20 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500 outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white">
            <button id="revealWhatsappLinkBtn" class="flex-1 px-4 py-2 bg-pink-500 text-white font-bold rounded-lg hover:bg-pink-600 transition-all">Verify</button>
        </div>
        <div id="whatsappActualLinkDisplay" class="mt-6 pt-6 border-t border-gray-100 dark:border-gray-700 hidden">
            <a href="#" id="whatsappFinalLink" target="_blank" class="flex items-center justify-center gap-3 text-pink-500 font-bold hover:scale-105 transition-transform">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span>Enter WhatsApp Group</span>
            </a>
        </div>
    </div>
</div>
